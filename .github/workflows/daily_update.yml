name: Actualización Diaria de Horarios GTFS

on:
  schedule:
    # Se ejecuta a las 21:00 UTC (23:00 hora peninsular de España)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar script dinámico
        run: python update_schedule.py

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cercanias_valencia_schedule.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update horarios [skip ci]"
            git pull --rebase origin main
            git push
          fi
