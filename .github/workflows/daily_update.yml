name: Actualización Diaria de Horarios GTFS

on:
  schedule:
    # Se ejecuta todos los días a las 21:00 UTC (23:00 hora peninsular española)
    - cron: '0 21 * * *'
  workflow_dispatch: # Permite ejecución manual de prueba

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar script dinámico
        run: python update_schedule.py

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cercanias_valencia_schedule.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update horarios [skip ci]" && git push)
